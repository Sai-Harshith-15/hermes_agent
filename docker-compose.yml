
services:
  # 1. FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    pid: "host"
    container_name: hermes_backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # CRITICAL: Maps the host's actual Hermes data into the backend
      - ~/.hermes:/root/.hermes
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    networks:
      - hermes_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/auth/me', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # 2. NGINX + React Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: hermes_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - hermes_net

  # 3. Automated Cloudflare Tunnel (optional - comment out if no token)
  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: hermes_tunnel
    restart: unless-stopped
    # Automatically routes public traffic to the NGINX frontend container
    command: tunnel --url http://frontend:80
    depends_on:
      - frontend
    networks:
      - hermes_net

networks:
  hermes_net:
    driver: bridge
